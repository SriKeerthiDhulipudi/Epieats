<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - EpiEats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white shadow-2xl rounded-xl w-full max-w-md p-10">
      <h1 class="text-3xl font-semibold text-center text-gray-800 mb-6">Create Your Account</h1>
      <form id="registerForm">
        <div class="mb-6">
          <label for="name" class="block text-gray-700 text-sm font-medium mb-2">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" required>
        </div>
        
        <div class="mb-6">
          <label for="email" class="block text-gray-700 text-sm font-medium mb-2">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" required>
        </div>

        <div class="mb-6">
          <label for="password" class="block text-gray-700 text-sm font-medium mb-2">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" required>
        </div>

        <button type="submit" class="w-full py-3 px-6 bg-green-600 text-white rounded-lg text-lg font-semibold hover:bg-green-700 transition">
          Register Account
        </button>
      </form>

      <p class="text-center mt-4 text-gray-600">
        Already have an account? <a href="login.html" class="text-green-500 hover:underline">Log in</a>
      </p>
    </div>
  </div>

  <script>
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const user = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      allergies: [] // 🧠 Add default empty allergy list
    };

    // Get existing users or create new array
    const users = JSON.parse(localStorage.getItem("users")) || [];

    // Check if email already registered
    const existingUser = users.find(u => u.email === user.email);
    if (existingUser) {
      alert("Email already registered. Please log in.");
      return;
    }

    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(user));

    alert('Registration successful! Redirecting to allergy selection...');
    window.location.href = 'allergy.html';
  });
</script>

</body>
</html>
