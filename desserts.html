   // Load user allergy profile
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const allergyProfile = document.getElementById("allergyProfile");

if (currentUser) {
  if (currentUser.allergies && currentUser.allergies.length > 0) {
    currentUser.allergies.forEach((allergy) => {
      const badge = document.createElement("span");
      badge.className =

      allergyProfile.appendChild(badge);

      <a href="register.html" class="text-green-500 hover:underline">Set your allergies</a>
    </p>`;
}


    // Filter dessert recipes based on allergies
    function filterRecipesByAllergies(allergies) {
      return recipes.filter((recipe) => {
        if (recipe.category !== "dessert") return false;
        return !allergies.some((allergy) =>
          Object.values(recipe.ingredients).some((ingredient) =>
            ingredient.toLowerCase().includes(allergy.toLowerCase())
          )
        );
      });
    }

    const dessertRecipes = recipes.filter(
      (recipe) => recipe.category === "dessert"
    );

    const filteredRecipes =
      currentUser?.allergies && currentUser.allergies.length > 0
        ? filterRecipesByAllergies(currentUser.allergies)
        : dessertRecipes;

    const recipesContainer = document.getElementById("dessertRecipes");

    if (filteredRecipes.length > 0) {
      filteredRecipes.forEach((recipe) => {
        const recipeCard = document.createElement("div");
        recipeCard.className =
          "recipe-card bg-white rounded-lg overflow-hidden shadow-md";
        recipeCard.innerHTML = `
                <img src="${recipe.image}" alt="${recipe.name}" class="w-full h-48 object-cover" />
                <div class="p-6">
                  <h3 class="text-xl font-semibold mb-2">${recipe.name}</h3>
                  <div class="flex flex-wrap mb-4">
                    ${Object.entries(recipe.substitutions)
                      .map(
                        ([original, substitute]) => `
                          <span class="text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded mr-2 mb-2">
                            ${original} → ${substitute}
                          </span>
                        `
                      )
                      .join("")}
                  </div>
                  <button class="text-green-500 hover:underline" onclick="showRecipeDetails('${recipe.name}')">
                    View Recipe
                  </button>
                </div>
              `;
        recipesContainer.appendChild(recipeCard);
      });

      recipesContainer.innerHTML = `
            <div class="col-span-3 text-center py-12">
              <p class="text-gray-500 mb-4">No dessert recipes available for your allergy profile.</p>
              <a href="register.html" class="text-green-500 hover:underline">Update your allergy preferences</a>
            </div>
          `;
    }

    // Show recipe details if logged in
    function showRecipeDetails(recipeName) {
      const currentUser = JSON.parse(localStorage.getItem("currentUser"));
      if (!currentUser) {
        alert("Please log in to view recipes.");
        window.location.href = "login.html";
        return;
      }

      const recipe = recipes.find((r) => r.name === recipeName);
      if (!recipe) {
        alert("Recipe not found.");
        return;
      }

      const ingredients = Object.values(recipe.ingredients)
        .map((ing, index) => `${index + 1}. ${ing}`)
        .join("\n");
      alert(
        `${recipe.name}\n\nIngredients:\n${ingredients}\n\nInstructions:\n${recipe.instructions}`
      );
    }
  </script>
</body>
</html>
